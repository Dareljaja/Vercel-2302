<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto | 2302</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: #0a0a0a; color: white; font-family: 'DM Sans', sans-serif; margin: 0;">
    
    <header style="padding: 20px; text-align: center; border-bottom: 1px solid #1a1a1a; background: #000;">
        <a href="index.html" style="color: #c9a962; text-decoration: none; letter-spacing: 2px; font-size: 0.8rem;">
            <i class="fas fa-arrow-left"></i> VOLVER AL INICIO
        </a>
    </header>
    
    <main id="product-container" style="max-width: 1100px; margin: 50px auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 50px;">
        <div class="product-image-side">
            <img id="p-image" src="" alt="" style="width: 100%; border: 1px solid #1a1a1a; border-radius: 4px; display: none;">
            <div id="loading-img" style="aspect-ratio: 1/1; background: #1a1a1a; display: flex; align-items: center; justify-content: center;">Cargando imagen...</div>
        </div>

        <div class="product-info-side">
            <span id="p-category" style="color: #c9a962; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px;"></span>
            <h1 id="p-name" style="font-family: 'Playfair Display', serif; font-size: 3rem; margin: 15px 0; color: #fff;"></h1>
            <p id="p-price" style="font-size: 1.8rem; color: #c9a962; font-weight: bold; margin-bottom: 25px;"></p>
            
            <div style="border-top: 1px solid #1a1a1a; padding-top: 25px;">
                <p style="color: #c9a962; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 10px;">DESCRIPCIÓN</p>
                <p id="p-desc" style="color: #a0a0a0; line-height: 1.8; font-size: 1rem; margin-bottom: 35px;"></p>
            </div>

            <button id="add-btn" class="product-btn" style="width: 100%; padding: 18px; cursor: pointer; background: #c9a962; color: #000; border: none; font-weight: bold; letter-spacing: 1px;">
                AGREGAR AL CARRITO
            </button>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');

            if (!productId) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const response = await fetch('/api/products');
                const data = await response.json();
                const products = Array.isArray(data) ? data : [];
                const product = products.find(p => p.id == productId);

                if (product) {
                    // Llenamos los datos
                    document.getElementById('p-name').textContent = product.nombre || product.name;
                    document.getElementById('p-price').textContent = `$${product.precio || product.price}`;
                    document.getElementById('p-desc').textContent = product.descripcion || product.description || 'Sin descripción disponible.';
                    document.getElementById('p-category').textContent = product.categoria || 'Cuidado Premium';
                    
                    const img = document.getElementById('p-image');
                    const imageUrl = product.imagen_url || product.image || '';
                    img.src = imageUrl || 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect fill="%231a1a1a" width="200" height="200"/%3E%3Ctext fill="%23666" x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="14"%3ESin imagen%3C/text%3E%3C/svg%3E';
                    img.alt = product.nombre || product.name || 'Producto';
                    img.onerror = function() { this.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect fill="%231a1a1a" width="200" height="200"/%3E%3Ctext fill="%23666" x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="14"%3ESin imagen%3C/text%3E%3C/svg%3E'; this.onerror = null; };
                    img.style.display = 'block';
                    document.getElementById('loading-img').style.display = 'none';

                    // Configurar botón de carrito
                    // Cantidad + validación de stock
                    const stockRaw = product.stock ?? product.Stock ?? product.cantidad ?? product.qty ?? null;
                    const stock = (stockRaw === null || stockRaw === undefined || stockRaw === '') ? null : Math.max(0, Math.trunc(Number(stockRaw) || 0));

                    const btn = document.getElementById('add-btn');
                    const qtyWrap = document.createElement('div');
                    qtyWrap.style.display = 'flex';
                    qtyWrap.style.gap = '12px';
                    qtyWrap.style.alignItems = 'center';
                    qtyWrap.style.marginBottom = '16px';
                    qtyWrap.innerHTML = `
                      <label style="font-size:.75rem;letter-spacing:2px;color:#c9a962;">CANTIDAD</label>
                      <input id="qty-input" type="number" min="1" step="1" value="1" style="flex:1; padding:12px; background:#000; border:1px solid #1a1a1a; color:#fff; border-radius:4px;">
                    `;
                    const infoSide = document.querySelector('.product-info-side');
                    infoSide.insertBefore(qtyWrap, btn);

                    const qtyInput = document.getElementById('qty-input');
                    if (stock !== null) {
                        qtyInput.max = String(Math.max(1, stock));
                        const stockEl = document.createElement('div');
                        stockEl.style.cssText = 'margin:-6px 0 18px; font-size:.85rem; color:#a0a0a0;';
                        stockEl.textContent = `Stock disponible: ${stock}`;
                        infoSide.insertBefore(stockEl, btn);
                        if (stock <= 0) {
                            btn.disabled = true;
                            btn.textContent = 'SIN STOCK';
                            btn.style.opacity = '0.6';
                            btn.style.cursor = 'not-allowed';
                        }
                    }

                    btn.onclick = () => {
                        const qty = Math.max(1, parseInt(qtyInput.value, 10) || 1);
                        if (stock !== null && qty > stock) {
                            alert(`No hay stock suficiente. Disponible: ${stock}`);
                            return;
                        }
                        // Guardar en carrito simple en localStorage (misma clave que script.js)
                        const key = '2302_cart';
                        let cart = [];
                        try { cart = JSON.parse(localStorage.getItem(key) || '[]'); } catch {}
                        const idx = cart.findIndex(i => i.id == product.id);
                        const current = idx >= 0 ? (cart[idx].quantity || 0) : 0;
                        if (stock !== null && (current + qty) > stock) {
                            alert(`No hay stock suficiente. Disponible: ${stock}`);
                            return;
                        }
                        const item = { ...product, quantity: current + qty };
                        if (idx >= 0) cart[idx] = item; else cart.push(item);
                        localStorage.setItem(key, JSON.stringify(cart));
                        alert('Producto agregado al carrito');
                    };
                } else {
                    document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:100px;'>Producto no encontrado</h1>";
                }
            } catch (error) {
                console.error("Error cargando detalle:", error);
            }
        });
    </script>
</body>
</html>
