<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto | 2302</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-input {
            width: 100%;
            padding: 14px 16px;
            background: linear-gradient(135deg, #111 0%, #0a0a0a 100%);
            border: 1px solid rgba(201, 169, 98, 0.2);
            color: #fff;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        .product-input:focus {
            outline: none;
            border-color: rgba(201, 169, 98, 0.5);
            box-shadow: 0 0 0 3px rgba(201, 169, 98, 0.1), 0 4px 12px rgba(0, 0, 0, 0.4);
        }
        .product-textarea {
            width: 100%;
            padding: 14px 16px;
            background: linear-gradient(135deg, #111 0%, #0a0a0a 100%);
            border: 1px solid rgba(201, 169, 98, 0.2);
            color: #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.7;
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        .product-textarea:focus {
            outline: none;
            border-color: rgba(201, 169, 98, 0.5);
            box-shadow: 0 0 0 3px rgba(201, 169, 98, 0.1), 0 4px 12px rgba(0, 0, 0, 0.4);
        }
        .product-label {
            color: #c9a962;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
            font-weight: 500;
            text-transform: uppercase;
        }
        .input-category {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #c9a962;
            font-weight: 600;
        }
        .input-name {
            font-size: 1.9rem;
            font-family: 'Playfair Display', serif;
            color: #fff;
            font-weight: 400;
        }
        .input-price {
            font-size: 1.6rem;
            color: #c9a962;
            font-weight: 700;
        }
    </style>
</head>
<body style="background-color: #0a0a0a; color: white; font-family: 'DM Sans', sans-serif; margin: 0;">
    
    <header style="padding: 20px; text-align: center; border-bottom: 1px solid #1a1a1a; background: #000;">
        <a href="index.html" style="color: #c9a962; text-decoration: none; letter-spacing: 2px; font-size: 0.8rem;">
            <i class="fas fa-arrow-left"></i> VOLVER AL INICIO
        </a>
    </header>
    
    <main id="product-container" style="max-width: 1100px; margin: 50px auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 50px;">
        <div class="product-image-side">
            <img id="p-image" src="" alt="" style="width: 100%; border: 1px solid #1a1a1a; border-radius: 4px; display: none;">
            <div id="loading-img" style="aspect-ratio: 1/1; background: #1a1a1a; display: flex; align-items: center; justify-content: center;">Cargando imagen...</div>
        </div>

        <div class="product-info-side">
            <label class="product-label">CATEGORÍA</label>
            <input type="text" id="p-category" readonly class="product-input input-category" style="margin-bottom: 20px;">
            
            <label class="product-label">NOMBRE DEL PRODUCTO</label>
            <input type="text" id="p-name" readonly class="product-input input-name" style="margin-bottom: 20px;">
            
            <label class="product-label">PRECIO</label>
            <input type="text" id="p-price" readonly class="product-input input-price" style="margin-bottom: 30px;">
            
            <div style="border-top: 1px solid rgba(201, 169, 98, 0.15); padding-top: 30px;">
                <label class="product-label">DESCRIPCIÓN</label>
                <textarea id="p-desc" readonly rows="6" class="product-textarea" style="margin-bottom: 25px;"></textarea>
                
                <div id="p-short-desc" style="display: none; margin-bottom: 25px;">
                    <label class="product-label">DESCRIPCIÓN CORTA</label>
                    <textarea readonly rows="3" class="product-textarea"></textarea>
                </div>
                
                <div id="p-size" style="display: none; margin-bottom: 25px;">
                    <label class="product-label">TAMAÑO</label>
                    <input type="text" readonly class="product-input">
                </div>
                
                <div id="p-ingredients" style="display: none; margin-bottom: 25px;">
                    <label class="product-label">INGREDIENTES</label>
                    <textarea readonly rows="4" class="product-textarea"></textarea>
                </div>
                
                <div id="p-how-to-use" style="display: none; margin-bottom: 25px;">
                    <label class="product-label">MODO DE USO</label>
                    <textarea readonly rows="4" class="product-textarea"></textarea>
                </div>
            </div>

            <button id="add-btn" class="product-btn" style="width: 100%; padding: 18px; cursor: pointer; background: #c9a962; color: #000; border: none; font-weight: bold; letter-spacing: 1px;">
                AGREGAR AL CARRITO
            </button>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');

            if (!productId) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const response = await fetch('/api/products');
                const data = await response.json();
                const products = Array.isArray(data) ? data : [];
                const product = products.find(p => p.id == productId);

                if (product) {
                    // Categoría
                    const categoryMap = {
                        'face': 'ROSTRO',
                        'body': 'CUERPO',
                        'hair': 'CABELLO'
                    };
                    const category = product.categoria || product.category || '';
                    document.getElementById('p-category').value = categoryMap[category.toLowerCase()] || category.toUpperCase() || 'CUIDADO PREMIUM';
                    
                    // Nombre del producto
                    document.getElementById('p-name').value = product.nombre || product.name || 'Producto';
                    
                    // Precio
                    document.getElementById('p-price').value = `$${Number(product.precio || product.price || 0).toLocaleString()}`;
                    
                    // Descripción completa (priorizar description que es el mapeo correcto)
                    const fullDesc = product.description || product.descripcion || 'Sin descripción disponible.';
                    document.getElementById('p-desc').value = fullDesc;
                    
                    // Descripción corta
                    const shortDesc = product.shortDescription || product['descripcion corta'];
                    if (shortDesc && shortDesc.trim()) {
                        const shortDescEl = document.getElementById('p-short-desc');
                        shortDescEl.style.display = 'block';
                        shortDescEl.querySelector('textarea').value = shortDesc;
                    }
                    
                    // Tamaño
                    const size = product.size || product.tamaño;
                    if (size && size.trim()) {
                        const sizeEl = document.getElementById('p-size');
                        sizeEl.style.display = 'block';
                        sizeEl.querySelector('input').value = size;
                    }
                    
                    // Ingredientes
                    const ingredients = product.ingredients || product.ingredientes;
                    if (ingredients && ingredients.trim()) {
                        const ingredientsEl = document.getElementById('p-ingredients');
                        ingredientsEl.style.display = 'block';
                        ingredientsEl.querySelector('textarea').value = ingredients;
                    }
                    
                    // Modo de uso
                    const howToUse = product.howToUse || product['modo de uso'];
                    if (howToUse && howToUse.trim()) {
                        const howToUseEl = document.getElementById('p-how-to-use');
                        howToUseEl.style.display = 'block';
                        howToUseEl.querySelector('textarea').value = howToUse;
                    }
                    
                    const img = document.getElementById('p-image');
                    const imageUrl = product.imagen_url || product.image || '';
                    img.src = imageUrl || 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect fill="%231a1a1a" width="200" height="200"/%3E%3Ctext fill="%23666" x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="14"%3ESin imagen%3C/text%3E%3C/svg%3E';
                    img.alt = product.nombre || product.name || 'Producto';
                    img.onerror = function() { this.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect fill="%231a1a1a" width="200" height="200"/%3E%3Ctext fill="%23666" x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="14"%3ESin imagen%3C/text%3E%3C/svg%3E'; this.onerror = null; };
                    img.style.display = 'block';
                    document.getElementById('loading-img').style.display = 'none';

                    // Configurar botón de carrito
                    document.getElementById('add-btn').onclick = () => {
                        // Reutilizamos la lógica de tu script.js si está cargado, 
                        // o simplemente avisamos que se agregó.
                        alert('Producto agregado al carrito');
                    };
                } else {
                    document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:100px;'>Producto no encontrado</h1>";
                }
            } catch (error) {
                console.error("Error cargando detalle:", error);
            }
        });
    </script>
</body>
</html>
