<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar compra | 2302</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .checkout-page { max-width: 600px; margin: 40px auto; padding: 20px; }
        .checkout-title { color: #c9a962; font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 24px; }
        .checkout-list { list-style: none; padding: 0; margin: 0 0 24px 0; border: 1px solid rgba(201,169,98,0.2); border-radius: 8px; overflow: hidden; }
        .checkout-item { display: flex; align-items: center; gap: 16px; padding: 16px; border-bottom: 1px solid rgba(201,169,98,0.1); background: rgba(0,0,0,0.3); }
        .checkout-item:last-child { border-bottom: none; }
        .checkout-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
        .checkout-item-info { flex: 1; }
        .checkout-item-name { color: #fff; font-weight: 600; }
        .checkout-item-qty { color: #999; font-size: 0.9rem; }
        .checkout-item-price { color: #c9a962; font-weight: 600; }
        .checkout-total { text-align: right; padding: 20px; background: rgba(201,169,98,0.08); border-radius: 8px; margin-bottom: 24px; }
        .checkout-total span { color: #c9a962; font-size: 1.25rem; font-weight: 700; }
        .checkout-empty { text-align: center; padding: 60px 20px; color: #999; }
        .checkout-empty a { color: #c9a962; text-decoration: none; }
        .checkout-actions { display: flex; flex-direction: column; gap: 12px; }
        .checkout-form { margin-bottom: 24px; }
        .checkout-form .form-group { margin-bottom: 16px; }
        .checkout-form label { display: block; color: #c9a962; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 6px; }
        .checkout-form input, .checkout-form textarea {
            width: 100%; padding: 12px 14px; background: #111; border: 1px solid rgba(201,169,98,0.3);
            border-radius: 6px; color: #fff; font-size: 1rem; font-family: inherit; box-sizing: border-box;
        }
        .checkout-form input::placeholder, .checkout-form textarea::placeholder { color: #666; }
        .checkout-form input:focus, .checkout-form textarea:focus {
            outline: none; border-color: #c9a962; box-shadow: 0 0 0 2px rgba(201,169,98,0.2);
        }
        .checkout-form textarea { min-height: 80px; resize: vertical; }
        .checkout-form .hint { color: #666; font-size: 0.8rem; margin-top: 4px; }
        .checkout-actions { display: flex; flex-direction: column; gap: 12px; }
        .checkout-actions .btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 16px 24px; border-radius: 8px; font-weight: 700; letter-spacing: 1px; transition: all 0.2s; cursor: pointer; font-size: 1rem; border: none; text-decoration: none; font-family: inherit; }
        .btn-whatsapp { background: #25d366; color: #fff; }
        .btn-whatsapp:hover { background: #20bd5a; transform: translateY(-1px); }
        .btn-whatsapp:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-back { background: transparent; color: #c9a962; border: 1px solid rgba(201,169,98,0.4); }
        .btn-back:hover { background: rgba(201,169,98,0.1); }
        #btnMercadoPago { background: #3d3d3d !important; color: #888 !important; cursor: not-allowed !important; }
        #btnMercadoPago:hover { background: #3d3d3d !important; transform: none !important; }
        .btn-whatsapp-wrap { position: relative; display: inline-block; }
        .btn-recomendado { position: absolute; top: -10px; right: -4px; background: #c9a962; color: #0a0a0a; font-size: 0.7rem; font-weight: 700; padding: 4px 8px; border-radius: 4px; white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,0.3); letter-spacing: 0.5px; }
        .form-error { color: #e74c3c; font-size: 0.85rem; margin-top: 4px; }
    </style>
</head>
<body style="background: #0a0a0a; color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh;">
    <div class="top-shipping-banner" role="marquee" aria-label="Solo envíos a Córdoba">
        <span class="marquee-wrap">
            <span class="marquee-content">Solo envíos a Córdoba &nbsp;&nbsp;•&nbsp;&nbsp; Solo envíos a Córdoba &nbsp;&nbsp;•&nbsp;&nbsp; Solo envíos a Córdoba &nbsp;&nbsp;•&nbsp;&nbsp; Solo envíos a Córdoba &nbsp;&nbsp;•&nbsp;&nbsp; Solo envíos a Córdoba &nbsp;&nbsp;•&nbsp;&nbsp;</span>
        </span>
    </div>
    <header class="detail-header" style="display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #1a1a1a; background: #000;">
        <a href="index.html" style="color: #c9a962; text-decoration: none; letter-spacing: 2px; font-size: 0.8rem;">
            <i class="fas fa-arrow-left"></i> VOLVER
        </a>
        <span style="color: #c9a962; font-size: 1.25rem; font-weight: 600;">23<span style="color: #fff;">02</span></span>
    </header>

    <main class="checkout-page">
        <h1 class="checkout-title">FINALIZAR COMPRA</h1>
        <div id="checkoutContent"></div>
    </main>

    <script>
        (function() {
            const CART_KEY = '2302_cart';
            const PLACEHOLDER_IMG = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect fill="%231a1a1a" width="200" height="200"/%3E%3Ctext fill="%23666" x="100" y="100" text-anchor="middle" dominant-baseline="middle" font-size="14"%3ESin imagen%3C/text%3E%3C/svg%3E';
            // Número de WhatsApp de la tienda: código país + número sin + ni espacios.
            const WHATSAPP_PHONE = '5493543560057';

            function getPrice(item) { return Number(item.price ?? item.precio ?? 0); }
            function getName(item) { return item.name ?? item.nombre ?? 'Producto'; }
            function getImg(item) { return item.imagen_url ?? item.image ?? PLACEHOLDER_IMG; }

            // Solo considerar ítems que son realmente del carrito (tienen id, quantity y nombre)
            function getCart() {
                const raw = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
                return Array.isArray(raw) ? raw.filter(function(item) {
                    return item && (item.id !== undefined && item.id !== null) && Number(item.quantity) > 0 && (item.name || item.nombre);
                }) : [];
            }

            const cart = getCart();

            const container = document.getElementById('checkoutContent');
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="checkout-empty">
                        <p>Tu carrito está vacío.</p>
                        <a href="index.html"><i class="fas fa-shopping-bag"></i> Ver productos</a>
                    </div>`;
                return;
            }

            let total = 0;
            const orderLines = [];
            const itemsHtml = cart.map(item => {
                const price = getPrice(item);
                const subtotal = price * item.quantity;
                total += subtotal;
                orderLines.push(`${item.quantity}x ${getName(item)} - $${subtotal.toLocaleString()}`);
                return `
                    <li class="checkout-item">
                        <img src="${getImg(item)}" alt="" onerror="this.src='${PLACEHOLDER_IMG}'">
                        <div class="checkout-item-info">
                            <div class="checkout-item-name">${getName(item).replace(/</g, '&lt;')}</div>
                            <div class="checkout-item-qty">Cantidad: ${item.quantity}</div>
                        </div>
                        <div class="checkout-item-price">$${subtotal.toLocaleString()}</div>
                    </li>`;
            }).join('');

            container.innerHTML = `
                <ul class="checkout-list">${itemsHtml}</ul>
                <div class="checkout-total">TOTAL: <span id="checkoutTotal">$${total.toLocaleString()}</span></div>
                <form id="checkoutForm" class="checkout-form" novalidate>
                    <div class="form-group">
                        <label for="nombre">Nombre y apellido *</label>
                        <input type="text" id="nombre" name="nombre" required placeholder="Ej: María García">
                        <span class="form-error" id="err-nombre"></span>
                    </div>
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required placeholder="tu@email.com">
                        <span class="form-error" id="err-email"></span>
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono / WhatsApp *</label>
                        <input type="tel" id="telefono" name="telefono" required placeholder="Ej: 11 1234-5678">
                        <span class="form-error" id="err-telefono"></span>
                    </div>
                    <div class="form-group">
                        <label for="direccion">Dirección de entrega *</label>
                        <input type="text" id="direccion" name="direccion" required placeholder="Calle, número, piso/depto">
                        <span class="form-error" id="err-direccion"></span>
                    </div>
                    <div class="form-group">
                        <label for="localidad">Localidad / Ciudad *</label>
                        <input type="text" id="localidad" name="localidad" required placeholder="Ej: CABA, La Plata">
                        <span class="form-error" id="err-localidad"></span>
                    </div>
                    <div class="form-group">
                        <label for="cp">Código postal</label>
                        <input type="text" id="cp" name="cp" placeholder="Ej: 1234">
                    </div>
                    <div class="form-group">
                        <label for="comentarios">Comentarios del pedido</label>
                        <textarea id="comentarios" name="comentarios" placeholder="Horario preferido, instrucciones, etc."></textarea>
                    </div>
                    <div class="checkout-actions">
                        <button type="button" class="btn" id="btnMercadoPago" disabled>
                            <i class="fas fa-credit-card"></i> Mercado Pago — Próximamente
                        </button>
                        <div class="btn-whatsapp-wrap">
                            <span class="btn-recomendado">(recomendado)</span>
                            <button type="submit" class="btn btn-whatsapp" id="btnEnviar">
                                <i class="fab fa-whatsapp"></i> Enviar pedido por WhatsApp
                            </button>
                        </div>
                        <div id="checkoutSaveStatus" style="min-height:22px;margin-top:10px;font-size:0.9rem;"></div>
                        <a href="index.html" class="btn btn-back"><i class="fas fa-arrow-left"></i> Seguir comprando</a>
                        <a href="#" id="vaciarCarrito" style="color:#888;font-size:0.85rem;margin-top:8px;">Vaciar carrito y volver</a>
                    </div>
                </form>`;

            document.getElementById('vaciarCarrito').addEventListener('click', function(e) {
                e.preventDefault();
                if (confirm('¿Vaciar el carrito y volver al inicio?')) {
                    localStorage.removeItem(CART_KEY);
                    window.location.href = 'index.html';
                }
            });

            // Mercado Pago deshabilitado (Próximamente) — no hace nada al hacer clic
            document.getElementById('btnMercadoPago').addEventListener('click', async function(e) {
                e.preventDefault();
                return;
                const nombre = (document.getElementById('nombre').value || '').trim();
                const email = (document.getElementById('email').value || '').trim();
                const telefono = (document.getElementById('telefono').value || '').trim();
                const direccion = (document.getElementById('direccion').value || '').trim();
                const localidad = (document.getElementById('localidad').value || '').trim();
                const cp = (document.getElementById('cp').value || '').trim();
                const comentarios = (document.getElementById('comentarios').value || '').trim();
                document.querySelectorAll('.form-error').forEach(el => { el.textContent = ''; });
                let valid = true;
                if (!nombre) { document.getElementById('err-nombre').textContent = 'Ingresá tu nombre.'; valid = false; }
                if (!email) { document.getElementById('err-email').textContent = 'Ingresá tu email.'; valid = false; }
                if (!telefono) { document.getElementById('err-telefono').textContent = 'Ingresá tu teléfono.'; valid = false; }
                if (!direccion) { document.getElementById('err-direccion').textContent = 'Ingresá la dirección.'; valid = false; }
                if (!localidad) { document.getElementById('err-localidad').textContent = 'Ingresá localidad/ciudad.'; valid = false; }
                if (!valid) return;
                var cartActual = getCart().filter(function(item) { return item && item.id != null && item.id !== ''; });
                if (cartActual.length === 0) {
                    alert('El carrito está vacío o tiene ítems inválidos.');
                    return;
                }
                let totalActual = 0;
                const itemsPayload = cartActual.map(function(item) {
                    const price = getPrice(item);
                    const subtotal = price * (item.quantity || 0);
                    totalActual += subtotal;
                    return { nombre: getName(item), cantidad: item.quantity, precio: price, subtotal: subtotal };
                });
                var statusEl = document.getElementById('checkoutSaveStatus');
                var apiBase = (window.location.origin || '').replace(/\/$/, '');
                try {
                    statusEl.innerHTML = '<span style="color:#c9a962;">Creando pedido…</span>';
                    var orderRes = await fetch(apiBase + '/api/orders', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            cliente_nombre: nombre,
                            cliente_email: email,
                            cliente_telefono: telefono,
                            direccion: direccion,
                            localidad: localidad,
                            cp: cp || '',
                            comentarios: comentarios || '',
                            items: itemsPayload,
                            total: totalActual
                        })
                    });
                    var orderData = await orderRes.json().catch(function() { return {}; });
                    if (!orderRes.ok) {
                        statusEl.innerHTML = '<span style="color:#e74c3c;">' + (orderData && orderData.message || 'Error al guardar pedido') + '</span>';
                        return;
                    }
                    var orderId = orderData && orderData.id;
                    if (!orderId) {
                        statusEl.innerHTML = '<span style="color:#e74c3c;">No se recibió ID del pedido.</span>';
                        return;
                    }
                    statusEl.innerHTML = '<span style="color:#c9a962;">Redirigiendo a Mercado Pago…</span>';
                    var prefItems = cartActual.map(function(item) {
                        if (!item || item.id == null) return null;
                        var p = getPrice(item);
                        return {
                            id: String(item.id),
                            name: getName(item),
                            quantity: Number(item.quantity) || 1,
                            price: p,
                            image: getImg(item)
                        };
                    }).filter(Boolean);
                    var prefRes = await fetch(apiBase + '/api/create-preference', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            items: prefItems,
                            payer: { name: nombre, email: email },
                            order_id: orderId
                        })
                    });
                    var prefData = await prefRes.json().catch(function() { return {}; });
                    if (!prefRes.ok || !(prefData && prefData.init_point)) {
                        var errMsg = (prefData && typeof prefData.error === 'string') ? prefData.error : 'Error al crear link de pago. Revisá que MERCADOPAGO_TOKEN esté configurado en Vercel.';
                        if (statusEl) statusEl.innerHTML = '<span style="color:#e74c3c;">' + String(errMsg).replace(/</g, '&lt;') + '</span>';
                        return;
                    }
                    window.location.href = prefData.init_point;
                } catch (err) {
                    var msg = (err && err.message) ? err.message : 'Error de conexión. Probá de nuevo.';
                    if (statusEl) statusEl.innerHTML = '<span style="color:#e74c3c;">' + String(msg).replace(/</g, '&lt;') + '</span>';
                    console.error(err);
                }
            });

            const form = document.getElementById('checkoutForm');
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const nombre = (document.getElementById('nombre').value || '').trim();
                const email = (document.getElementById('email').value || '').trim();
                const telefono = (document.getElementById('telefono').value || '').trim();
                const direccion = (document.getElementById('direccion').value || '').trim();
                const localidad = (document.getElementById('localidad').value || '').trim();
                const cp = (document.getElementById('cp').value || '').trim();
                const comentarios = (document.getElementById('comentarios').value || '').trim();

                document.querySelectorAll('.form-error').forEach(el => { el.textContent = ''; });
                let valid = true;
                if (!nombre) { document.getElementById('err-nombre').textContent = 'Ingresá tu nombre.'; valid = false; }
                if (!email) { document.getElementById('err-email').textContent = 'Ingresá tu email.'; valid = false; }
                if (!telefono) { document.getElementById('err-telefono').textContent = 'Ingresá tu teléfono.'; valid = false; }
                if (!direccion) { document.getElementById('err-direccion').textContent = 'Ingresá la dirección.'; valid = false; }
                if (!localidad) { document.getElementById('err-localidad').textContent = 'Ingresá localidad/ciudad.'; valid = false; }
                if (!valid) return;

                // Releer el carrito al enviar para usar siempre el estado actual
                const cartActual = getCart();
                if (cartActual.length === 0) {
                    alert('El carrito está vacío. Agregá productos antes de enviar.');
                    return;
                }
                let totalActual = 0;
                const lineasPedido = cartActual.map(function(item) {
                    const price = getPrice(item);
                    const subtotal = price * item.quantity;
                    totalActual += subtotal;
                    return item.quantity + 'x ' + getName(item) + ' - $' + subtotal.toLocaleString();
                });

                // Un solo mensaje con todo el contenido (datos + pedido + total)
                const msg = [
                    '¡Hola! Quiero comprar en 2302:',
                    '',
                    '— DATOS —',
                    'Nombre: ' + nombre,
                    'Email: ' + email,
                    'Teléfono: ' + telefono,
                    'Dirección: ' + direccion,
                    'Localidad: ' + localidad + (cp ? ' (CP: ' + cp + ')' : ''),
                    comentarios ? 'Comentarios: ' + comentarios : '',
                    '',
                    '— PEDIDO —',
                    lineasPedido.join('\n'),
                    '',
                    'TOTAL: $' + totalActual.toLocaleString()
                ].filter(Boolean).join('\n');

                // Guardar pedido en el servidor para que aparezca en el panel admin (Ventas / Pedidos)
                const itemsPayload = cartActual.map(function(item) {
                    const price = getPrice(item);
                    const subtotal = price * item.quantity;
                    return {
                        nombre: getName(item),
                        cantidad: item.quantity,
                        precio: price,
                        subtotal: subtotal
                    };
                });
                var statusEl = document.getElementById('checkoutSaveStatus');
                if (statusEl) statusEl.innerHTML = '<span style="color:#c9a962;">Guardando pedido…</span>';
                var apiUrl = (window.location.origin || '').replace(/\/$/, '') + '/api/orders';
                fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        cliente_nombre: nombre,
                        cliente_email: email,
                        cliente_telefono: telefono,
                        direccion: direccion,
                        localidad: localidad,
                        cp: cp || '',
                        comentarios: comentarios || '',
                        items: itemsPayload,
                        total: totalActual
                    })
                }).then(function(r) {
                    var contentType = r.headers.get('Content-Type') || '';
                    var bodyPromise = contentType.indexOf('json') >= 0 ? r.json() : r.text().then(function(t) { try { return JSON.parse(t); } catch (e) { return { message: t || 'Error ' + r.status }; } });
                    return bodyPromise.then(function(data) {
                        if (r.ok) {
                            if (statusEl) statusEl.innerHTML = '<span style="color:#28a745;">Pedido guardado. Aparece en Admin → Ventas / Pedidos.</span>';
                            return data;
                        }
                        var msg = (data && data.message) || ('Error ' + r.status);
                        if (statusEl) statusEl.innerHTML = '<span style="color:#e74c3c;">No se guardó: ' + msg + '</span>';
                        console.error('Error al guardar pedido:', msg);
                        return data;
                    });
                }).catch(function(err) {
                    if (statusEl) statusEl.innerHTML = '<span style="color:#e74c3c;">No se pudo conectar. Probá desde la URL de Vercel (no localhost).</span>';
                    console.error('Error de red al guardar pedido:', err);
                });

                // Abrir WhatsApp con el mensaje ya escrito (wa.me/NUMERO?text= es el formato que muestra el mensaje)
                var url = 'https://wa.me/' + WHATSAPP_PHONE + '?text=' + encodeURIComponent(msg);
                window.open(url, '_blank', 'noopener');
            });
        })();
    </script>
</body>
</html>
