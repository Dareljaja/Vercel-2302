<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2302 | CUIDADO PERSONAL</title>
    <meta name="description" content="2302 - La nueva era del cuidado personal. Productos premium para tu evolución.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
</head>
<body>
    <div class="page-background"></div>

    <header class="header" id="header">
        <div class="container header-content">
            <a href="#home" class="logo">23<span>02</span></a>
            <nav class="nav-desktop">
                <ul class="nav-list">
                    <li><a href="#home" class="nav-link active">Inicio</a></li>
                    <li><a href="#products" class="nav-link">Productos</a></li>
                    <li><a href="#collection" class="nav-link">Colección</a></li>
                    <li><a href="#about" class="nav-link">Nosotros</a></li>
                    <li><a href="#contact" class="nav-link">Contacto</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button class="cart-btn" id="cartBtn">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
            </div>
        </div>
    </header>

    <section class="hero" id="home">
        <div class="hero-content">
            <span class="hero-subtitle">Cuidado Personal Elevado</span>
            <h1 class="hero-title">2302<span>Cuidados Excepcionales</span></h1>
            <a href="#collection" class="btn btn-primary">Explorar Colección</a>
        </div>
    </section>

    <section class="products-section" id="products">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">PRODUCTOS</h2>
                <p>Formulaciones de siguiente generación.</p>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </div>
    </section>

    <section class="collection-section" id="collection">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">COLECCIÓN</h2>
            </div>
            <div class="collection-grid" id="collectionGrid"></div>
        </div>
    </section>

    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2 class="cart-title">TU CARRITO</h2>
            <button class="cart-close" id="closeCart"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer" id="cartFooter">
            <div class="cart-total">
                <span>TOTAL:</span>
                <span id="cartTotal">$0</span>
            </div>
            <button class="btn btn-primary btn-block" id="checkoutBtn">FINALIZAR COMPRA</button>
        </div>
    </aside>

    <div class="cart-overlay" id="cartOverlay"></div>
    <script src="script.js"></script>
</body>
</html>
