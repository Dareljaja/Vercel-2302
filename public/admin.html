<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2302 | ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #d4af37;
            font-family: 'Space+Grotesk', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        body .login-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: #111;
            padding: 40px;
            border: 1px solid #d4af37;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }
        h2 { margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #d4af37; }
        button {
            width: 100%;
            padding: 12px;
            background: #d4af37;
            color: black;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #fff; }
        .top-shipping-banner { background: #fff; color: #333; padding: 10px 0; overflow: hidden; white-space: nowrap; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.5px; border-bottom: 1px solid #eee; }
        .top-shipping-banner .marquee-wrap { display: inline-block; padding-left: 100%; animation: marquee 18s linear infinite; }
        .top-shipping-banner .marquee-content { display: inline-block; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>
    <div class="top-shipping-banner" role="marquee" aria-label="Envíos a todo el país - cotización por WhatsApp">
        <span class="marquee-wrap">
            <span class="marquee-content">Envíos a todo el país - cotización por WhatsApp &nbsp;&nbsp;•&nbsp;&nbsp; Envíos a todo el país - cotización por WhatsApp &nbsp;&nbsp;•&nbsp;&nbsp; Envíos a todo el país - cotización por WhatsApp &nbsp;&nbsp;•&nbsp;&nbsp; Envíos a todo el país - cotización por WhatsApp &nbsp;&nbsp;•&nbsp;&nbsp; Envíos a todo el país - cotización por WhatsApp &nbsp;&nbsp;•&nbsp;&nbsp;</span>
        </span>
    </div>
    <div class="login-container">
        <h2>ADMIN 2302</h2>
        <form id="adminLoginForm">
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit" id="btnAcceder">ACCEDER</button>
        </form>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnAcceder');
            const password = document.getElementById('password').value;
            
            btn.innerText = 'CARGANDO...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ password })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    // Guardamos el token y redirigimos
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = '/admin-panel.html';
                } else {
                    alert(data.message || 'Contraseña incorrecta');
                }
            } catch (err) {
                console.error('Error:', err);
                alert('Error de conexión con la API. Revisa que el archivo api/login.js exista.');
            } finally {
                btn.innerText = 'ACCEDER';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
