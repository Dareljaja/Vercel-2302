<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2302 | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #d4af37;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(212,175,55,.2);
        }
        .admin-title { font-size: 2rem; font-weight: 300; letter-spacing: 2px; }
        .logout-btn {
            background: #333;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: .3s;
        }
        .logout-btn:hover { background: #d4af37; color: #000; }
        .products-section { margin-bottom: 40px; }
        .section-title { font-size: 1.5rem; margin-bottom: 20px; font-weight: 400; }
        .btn {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: .3s;
        }
        .btn:hover { background: #fff; transform: translateY(-1px); }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-secondary { background: #555; color: #d4af37; }
        .products-table {
            width: 100%;
            border-collapse: collapse;
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,.3);
        }
        .products-table th, .products-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        .products-table th { background: #1a1a1a; font-weight: 500; }
        .price { font-family: monospace; font-weight: bold; }
        .actions { display: flex; gap: 8px; }
        .form-container {
            background: #111;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid rgba(212,175,55,.2);
            margin-bottom: 30px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            opacity: .8;
            font-size: .9em;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #d4af37;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .upload-area {
            border: 2px dashed #d4af37;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: .3s;
            background: rgba(212,175,55,.05);
        }
        .upload-area:hover, .upload-area.dragover { background: rgba(212,175,55,.15); }
        .upload-area i { font-size: 3rem; opacity: .5; margin-bottom: 15px; }
        .image-preview { 
            max-width: 200px; 
            max-height: 200px; 
            border-radius: 4px; 
            margin-top: 10px; 
        }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: .3s;
        }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #d4af37;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #d4af37;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: .6;
        }
        @media (max-width: 768px) {
            .admin-container { padding: 10px; }
            .admin-header { flex-direction: column; gap: 20px; text-align: center; }
            .form-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .products-table { font-size: .85rem; }
            .products-table th, .products-table td { padding: 12px 8px; }
            .actions { flex-direction: column; }
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .loading { opacity: .6; pointer-events: none; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1 class="admin-title">2302 Admin <i class="fas fa-crown"></i></h1>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
        </div>

        <div class="form-container">
            <h2 class="section-title"><i class="fas fa-plus"></i> Nuevo Producto</h2>
            <form id="productForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombre *</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>Precio * ($)</label>
                        <input type="number" id="price" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="category">
                            <option value="face">Rostro</option>
                            <option value="body">Cuerpo</option>
                            <option value="hair">Cabello</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tamaño</label>
                        <input type="text" id="size" placeholder="ej: 400ml">
                    </div>
                    <div class="form-group">
                        <label>Descripción corta</label>
                        <textarea id="shortDescription" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Descripción completa</label>
                        <textarea id="description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Ingredientes</label>
                        <textarea id="ingredients" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Modo de uso</label>
                        <textarea id="howToUse" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>URL de imagen (recomendado)</label>
                        <input type="text" id="imageUrlInput" placeholder="https://ejemplo.com/imagen.jpg" autocomplete="url">
                    </div>

                    <div class="form-group">
                        <label>Destacar</label>
                        <div class="form-row">
                            <div class="checkbox-group">
                                <input type="checkbox" id="popular">
                                <label for="popular">Popular</label>
                            </div>
                            <div class="checkbox-group">
                                <input type="checkbox" id="offer">
                                <label for="offer">Oferta</label>
                            </div>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn" id="submitBtn">
                    <i class="fas fa-save"></i> Guardar Producto
                </button>
            </form>
        </div>

        <div class="products-section">
            <h2 class="section-title">
                <i class="fas fa-list"></i> Productos 
                <span id="productsCount" class="success"></span>
            </h2>
            <div id="productsList">
                <div class="empty-state" id="productsEmptyState">
                    <i class="fas fa-spinner fa-spin" style="font-size:2rem;margin-bottom:12px;display:block;color:#d4af37;"></i>
                    <p>Cargando productos…</p>
                    <button type="button" class="btn" id="retryLoadBtn" style="margin-top:16px;display:inline-block;">
                        <i class="fas fa-sync-alt"></i> Reintentar carga
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Editar Producto</h3>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editForm"></form>
        </div>
    </div>

<script>
        let products = [];
        let editingId = null;
        let uploadUrl = '';

        async function safeJson(res) {
            const text = await res.text();
            try {
                return JSON.parse(text);
            } catch {
                throw new Error('La API no respondió correctamente. Prueba en la URL de Vercel (tu-proyecto.vercel.app), haz Redeploy tras añadir las variables, y revisa que 2302.com.ar esté en Vercel > Domains.');
            }
        }

        // Load products: muestra "Cargando...", fetch con timeout, luego tabla o vacío + botón Reintentar
        async function loadProducts() {
            const container = document.getElementById('productsList');
            const countEl = document.getElementById('productsCount');
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin" style="font-size:2rem;margin-bottom:12px;display:block;color:#d4af37;"></i>
                    <p>Cargando productos…</p>
                    <button type="button" class="btn" id="retryLoadBtn" style="margin-top:16px;display:inline-block;"><i class="fas fa-sync-alt"></i> Reintentar</button>
                </div>`;
            countEl.textContent = '';
            const retryBtn = document.getElementById('retryLoadBtn');
            if (retryBtn) retryBtn.addEventListener('click', loadProducts);

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);

            try {
                const res = await fetch('/api/admin/products', { cache: 'no-store', signal: controller.signal });
                clearTimeout(timeoutId);
                const data = await safeJson(res);
                if (!res.ok) throw new Error(data.message || 'Error al cargar');
                const list = Array.isArray(data.products) ? data.products : (Array.isArray(data) ? data : []);
                products = list;
                renderProducts();
            } catch (err) {
                clearTimeout(timeoutId);
                console.error('Error loading products:', err);
                products = [];
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="font-size:2rem;margin-bottom:12px;display:block;color:#d4af37;"></i>
                        <h3>No se pudieron cargar los productos</h3>
                        <p style="margin-bottom:12px;">${err.message || 'Error de conexión.'}</p>
                        <button type="button" class="btn" id="retryLoadBtn" style="margin-top:8px;display:inline-block;background:#d4af37;color:#000;"><i class="fas fa-sync-alt"></i> Reintentar carga</button>
                    </div>`;
                countEl.textContent = '';
                document.getElementById('retryLoadBtn').addEventListener('click', loadProducts);
            }
        }

        function renderProducts() {
            const container = document.getElementById('productsList');
            const count = document.getElementById('productsCount');
            
            count.textContent = products.length ? `(${products.length})` : '';
            
            if (!products.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open" style="font-size:4rem;opacity:.3;margin-bottom:20px;display:block;"></i>
                        <h3>No hay productos</h3>
                        <p>Crea tu primer producto arriba o pulsa Reintentar si deberían aparecer.</p>
                        <button type="button" class="btn" id="retryLoadBtn" style="margin-top:16px;display:inline-block;background:#d4af37;color:#000;"><i class="fas fa-sync-alt"></i> Reintentar carga</button>
                    </div>
                `;
                const retryBtn = container.querySelector('#retryLoadBtn');
                if (retryBtn) retryBtn.addEventListener('click', loadProducts);
                return;
            }

            container.innerHTML = `
                <table class="products-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Categoría</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
${products.map(p => {
                            const price = p.price ?? p.precio;
                            const priceStr = (price != null && price !== '') ? Number(price).toLocaleString() : '—';
                            return `
                            <tr>
                                <td>${p.id ?? '—'}</td>
                                <td>
                                    ${(p.image_url || p.imagen_url) ? `<img src="${String(p.image_url || p.imagen_url).replace(/"/g, '&quot;')}" style="width:50px;height:50px;object-fit:cover;border-radius:4px;background:#1a1a1a;" onerror="this.outerHTML='<span style=color:#666>—</span>'">` : '<span style="color:#666">—</span>'}
                                </td>
                                <td>${(p.name ?? p.nombre) || '—'}</td>
                                <td><span class="price">$${priceStr}</span></td>
                                <td>${(p.category ?? p.categoria) || '—'}</td>
                                <td>
                                    ${p.popular ? '<span class="success">⭐ Popular</span>' : ''}
                                    ${p.offer ? '<span class="success">🛒 Oferta</span>' : ''}
                                </td>
                                <td>
                                    <div class="actions">
                                        <button type="button" class="btn btn-secondary edit-btn" data-id="${p.id ?? ''}">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button type="button" class="btn btn-danger delete-btn" data-id="${p.id ?? ''}">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        // Form handling
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
            btn.disabled = true;
            document.body.classList.add('loading');

            try {
                const imageUrlInput = document.getElementById('imageUrlInput').value?.trim();
                const productData = {
                    name: document.getElementById('name').value,
                    price: document.getElementById('price').value,
                    category: document.getElementById('category').value,
                    shortDescription: document.getElementById('shortDescription').value,
                    description: document.getElementById('description').value,
                    size: document.getElementById('size').value,
                    ingredients: document.getElementById('ingredients').value,
                    howToUse: document.getElementById('howToUse').value,
                    image_url: imageUrlInput || uploadUrl || '',
                    popular: document.getElementById('popular').checked,
                    offer: document.getElementById('offer').checked
                };

                const res = await fetch('/api/admin/products', {
                    method: editingId ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(editingId ? { id: editingId, ...productData } : productData)
                });

                const data = await safeJson(res);
                if (!res.ok) throw new Error(data.message);

                const savedImg = (data.product && (data.product.image_url || data.product.imagen_url)) || '';
                let msg = editingId ? 'Producto actualizado' : 'Producto creado';
                if (savedImg) msg += '\nImagen guardada: ' + savedImg.substring(0, 70) + (savedImg.length > 70 ? '...' : '');
                else if (imageUrlInput || uploadUrl) msg += '\n(La URL no se guardó; revisa que la columna en Supabase se llame imagen_url.)';
                else msg += '\n(Sin URL de imagen.)';
                alert(msg);
                
                // Reset form
                document.getElementById('productForm').reset();
                uploadUrl = '';
                document.getElementById('imageUrlInput').value = '';
                editingId = null;
                document.querySelector('#submitBtn i').className = 'fas fa-save';

                loadProducts();
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                document.body.classList.remove('loading');
            }
        });

        // Image upload
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('imageFile');
        const preview = document.getElementById('imagePreview');
        const urlDisplay = document.getElementById('uploadUrl');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', async (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) await uploadImage(file);
        });
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) uploadImage(file);
        });

        async function uploadImage(file) {
            if (!file.type.startsWith('image/')) {
                alert('Solo imágenes');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('file', file);

                const res = await fetch('/api/admin/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await safeJson(res);
                if (!res.ok) throw new Error(data.message);

                uploadUrl = data.url;
                urlDisplay.textContent = `URL: ${data.url}`;
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
            } catch (err) {
                alert('Error al subir: ' + err.message + '\n\nUsa "URL de imagen" para pegar un enlace directo a la imagen.');
            }
        }

        // Edit/Delete
        async function editProduct(id) {
            const idNorm = id != null ? Number(id) : NaN;
            if (isNaN(idNorm)) return;
            const product = products.find(p => p.id == idNorm || p.id === id || String(p.id) === String(id));
            if (!product) return;

            editingId = idNorm;

            // Populate form
            document.getElementById('name').value = product.name;
            document.getElementById('price').value = product.price;
            document.getElementById('category').value = product.category || 'face';
            document.getElementById('shortDescription').value = product.shortDescription;
            document.getElementById('description').value = product.description;
            document.getElementById('size').value = product.size;
            document.getElementById('ingredients').value = product.ingredients;
            document.getElementById('howToUse').value = product.howToUse;
            document.getElementById('popular').checked = product.popular;
            document.getElementById('offer').checked = product.offer;
            
            document.getElementById('imageUrlInput').value = product.image_url || '';

            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-sync"></i> Actualizar Producto';
            document.getElementById('name').focus();
        }

        async function deleteProduct(id) {
            if (!confirm('¿Eliminar producto?')) return;
            const idNorm = id != null ? Number(id) : NaN;
            if (isNaN(idNorm)) return;
            try {
                const res = await fetch(`/api/admin/products?id=${idNorm}`, {
                    method: 'DELETE'
                });
                const data = await safeJson(res);
                if (!res.ok) throw new Error(data.message);

                loadProducts();
            } catch (err) {
                alert('Delete error: ' + err.message);
            }
        }

        function closeEditModal() {
            editingId = null;
            document.getElementById('editModal').classList.remove('active');
        }

        function logout() {
            window.location.href = 'index.html';
        }

        window.logout = logout;
        window.closeEditModal = closeEditModal;

        // Delegación de eventos: editar y eliminar (funciona con botones dinámicos)
        document.getElementById('productsList').addEventListener('click', (e) => {
            const editBtn = e.target.closest('.edit-btn');
            const deleteBtn = e.target.closest('.delete-btn');
            if (editBtn) {
                e.preventDefault();
                e.stopPropagation();
                const id = editBtn.getAttribute('data-id');
                if (id != null && id !== '') editProduct(id);
            } else if (deleteBtn) {
                e.preventDefault();
                e.stopPropagation();
                const id = deleteBtn.getAttribute('data-id');
                if (id != null && id !== '') deleteProduct(id);
            }
        });

        window.loadProducts = loadProducts;

        // Init: enlazar botón Reintentar del HTML inicial y cargar productos (sin reintento automático para evitar bucle)
        var initialRetry = document.getElementById('retryLoadBtn');
        if (initialRetry) initialRetry.addEventListener('click', loadProducts);
        loadProducts();
    </script>
</body>
</html>
